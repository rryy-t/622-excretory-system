<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>네프론 기차 여행</title>
  <style>
    html, body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; text-align: center; }
    .container { max-width: 800px; margin: 0 auto; background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; font-size: 22px; margin-bottom: 5px; }
    .subtitle { color: #7f8c8d; font-size: 13px; margin-bottom: 20px; }
    .char-select { display: block; margin-bottom: 20px; }
    .char-link { display: inline-block; padding: 12px 22px; margin: 6px; border: 2px solid #bdc3c7; border-radius: 20px; background: #ffffff; color: #2c3e50; text-decoration: none; font-weight: bold; font-size: 15px; }
    .char-link.active { background: #1abc9c !important; color: #ffffff !important; border-color: #16a085 !important; }
    .game-box { display: none; border: 2px dashed #34495e; padding: 15px; border-radius: 8px; background: #fafafa; }
    .route-map { display: block; background: #2c3e50; color: #ffffff; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
    .route-node { display: inline-block; padding: 5px 10px; border-radius: 4px; background: #34495e; min-width: 90px; }
    .route-node.current { background: #e74c3c; border: 1px solid #ffffff; }
    .route-node.empty { background: rgba(255,255,255,0.1); color: #7f8c8d; }
    .route-arrow { display: inline-block; margin: 0 8px; color: #1abc9c; }
    .booth-zone { margin: 20px 0; padding: 15px; background: #f1f2f6; border-radius: 6px; }
    .booth-title { font-size: 14px; color: #7f8c8d; font-weight: bold; margin-bottom: 10px; display: block; }
    .utility-link { display: inline-block; padding: 6px 12px; font-size: 13px; font-weight: bold; border-radius: 4px; color: #ffffff; text-decoration: none; margin: 0 5px; }
    .btn-hint { background: #f1c40f; color: #2c3e50; }
    .btn-back { background: #95a5a6; display: none; }
    .ticket-zone { margin-top: 10px; display: block; }
    .ticket-link { display: inline-block; width: 160px; padding: 14px 10px; margin: 6px; border-radius: 6px; font-size: 16px; font-weight: bold; color: #ffffff; text-decoration: none; }
    .t-filter { background: #e67e22; border-bottom: 3px solid #d35400; } 
    .t-reabsorb { background: #2ecc71; border-bottom: 3px solid #27ae60; } 
    .t-secrete { background: #9b59b6; border-bottom: 3px solid #8e44ad; } 
    .t-pass { background: #3498db; border-bottom: 3px solid #2980b9; }
    .message-box { margin-top: 15px; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 15px; display: none; }
    .hint-box { background: #e8f4f8; color: #2980b9; border: 1px solid #3498db; }
    .correct-box { background: #d4edda; color: #155724; border: 1px solid #28a745; }
    .wrong-box { background: #f8d7da; color: #721c24; border: 1px solid #dc3545; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎫 네프론 물질 여행 매표소 앱</h1>
  <div class="subtitle">물질 선택하고, 각 매표소의 이동 방향에 맞는 올바른 과학 티켓을 발권해 주세요!</div>
  <div class="char-select">
    <a href="javascript:void(0);" class="char-link" id="link-단백질" onclick="selectCharacter('단백질'); return false;">단백질</a>
    <a href="javascript:void(0);" class="char-link" id="link-혈구" onclick="selectCharacter('혈구'); return false;">혈구</a>
    <a href="javascript:void(0);" class="char-link" id="link-포도당" onclick="selectCharacter('포도당'); return false;">포도당</a>
    <a href="javascript:void(0);" class="char-link" id="link-아미노산" onclick="selectCharacter('아미노산'); return false;">아미노산</a>
    <a href="javascript:void(0);" class="char-link" id="link-무기염류" onclick="selectCharacter('무기염류'); return false;">무기염류</a>
    <a href="javascript:void(0);" class="char-link" id="link-요소" onclick="selectCharacter('요소'); return false;">요소</a>
  </div>
  <div class="game-box" id="gameBox">
    <div class="route-map">
      <div class="route-node" id="prevStation">이전</div><div class="route-arrow">▶</div>
      <div class="route-node current" id="curStation">현재</div><div class="route-arrow">▶</div>
      <div class="route-node" id="nextStation">다음</div>
    </div>
    <div class="booth-zone" id="boothZone">
      <span class="booth-title">
        <a href="javascript:void(0);" class="utility-link btn-back" id="backBtn" onclick="goBackStation(); return false;">⬅️ 되돌아가기</a>
        🛒 창구에서 알맞은 티켓을 선택하세요
        <a href="javascript:void(0);" class="utility-link btn-hint" onclick="showStationHint(); return false;">💡 힌트 보기</a>
      </span>
      <div class="ticket-zone" id="ticketZone"></div>
    </div>
    <div id="hintBox" class="message-box hint-box"></div>
    <div id="correctBox" class="message-box correct-box"></div>
    <div id="wrongBox" class="message-box wrong-box"></div>
  </div>
</div>
<script>
  var character = ""; var currentStation = "콩팥동맥"; var stationHistory = []; 
  var hints = {
    "단백질": "크기가 세포만큼 매우 큽니다. 여과 장벽을 통과할 수 없습니다.",
    "혈구": "적혈구, 백혈구 등 혈액 세포입니다. 덩치가 아주 커서 통과하지 못합니다.",
    "포도당": "분자가 매우 작아 여과되지만, 몸의 핵심 에너지원이라 세뇨관에서 100% 다시 가져와야 합니다.",
    "아미노산": "소화된 단백질 기초 영양소입니다. 세뇨관 영역에서 전부 재흡수 대상이 됩니다.",
    "무기염류": "크기가 작아 쉽게 여과되며, 몸의 삼투압 상태에 맞춰 필요한 만큼 재흡수되거나 배출됩니다.",
    "요소": "간에서 만들어진 독성 노폐물입니다. 여과된 후 재흡수되지 않고 배출되거나 추가로 쫓겨납니다."
  };
  var correctExplains = {
    "콩팥동맥": { "여과": "은(는) 분자 크기가 매우 작기 때문에 토리의 높은 압력에 의해 보먼주머니로 정상 여과됩니다!", "통과": "은(는) 크기가 매우 큰 물질이므로 여과되지 못하고 모세혈관으로 그냥 통과합니다!" },
    "세뇨관": { "재흡수": "은(는) 몸에 필요한 영양소이므로 세뇨관에서 모세혈관으로 다시 재흡수됩니다!", "통과": "은(는) 노폐물이거나 과다한 성분이므로 재흡수되지 않고 오줌 통로를 그냥 통과해 콩팥깔때기로 향합니다!" },
    "모세혈관": { "분비": "은(는) 미처 여과되지 못하고 혈액에 남은 독성 노폐물이라 분비 작용을 거쳐 세뇨관으로 강력 퇴출당합니다!", "통과": "은(는) 필요한 물질이므로 온몸 복귀를 위해 콩팥정맥 방향으로 통과합니다!" }
  };
  function selectCharacter(name) {
    character = name; currentStation = "콩팥동맥"; stationHistory = []; 
    document.getElementById("gameBox").style.display = "block";
    document.getElementById("boothZone").style.display = "block";
    var list = ["단백질", "혈구", "포도당", "아미노산", "무기염류", "요소"];
    for (var i = 0; i < list.length; i++) {
      var lnk = document.getElementById("link-" + list[i]);
      if (lnk) { lnk.className = (list[i] === name) ? 'char-link active' : 'char-link'; }
    }
    moveStation("콩팥동맥", false); 
  }
  function showStationHint() {
    if (!character) return; hideAllMessageBoxes();
    var hb = document.getElementById("hintBox"); hb.style.display = "block";
    hb.innerHTML = "💡 <strong>[" + character + "] 힌트:</strong> " + hints[character];
  }
  function goBackStation() {
    if (stationHistory.length > 0) { moveStation(stationHistory.pop(), false); }
  }
  function hideAllMessageBoxes() {
    document.getElementById("hintBox").style.display = "none";
    document.getElementById("correctBox").style.display = "none";
    document.getElementById("wrongBox").style.display = "none";
  }
  function moveStation(station, saveHistory) {
    if (saveHistory !== false && currentStation !== station) { stationHistory.push(currentStation); }
    currentStation = station;
    var prev = document.getElementById("prevStation"), cur = document.getElementById("curStation"), next = document.getElementById("nextStation");
    var tz = document.getElementById("ticketZone"), boothZone = document.getElementById("boothZone"), backBtn = document.getElementById("backBtn");
    backBtn.style.display = (stationHistory.length === 0) ? "none" : "inline-block";
    hideAllMessageBoxes();
    if (station === "콩팥동맥") {
      prev.innerText = "출발지"; prev.className = "route-node empty"; cur.innerText = "콩팥동맥"; next.innerText = "보먼 / 모세혈관"; next.className = "route-node";
      tz.innerHTML = '<a href="javascript:void(0);" class="ticket-link t-filter" onclick="handleTicket(\'여과\'); return false;">🎟️ 여과 티켓</a>' +
                     '<a href="javascript:void(0);" class="ticket-link t-pass" onclick="handleTicket(\'통과\'); return false;">🎫 통과 티켓</a>';
    } else if (station === "보먼주머니") {
      prev.innerText = "콩팥동맥"; prev.className = "route-node"; cur.innerText = "보먼주머니"; next.innerText = "세뇨관 기차"; next.className = "route-node";
      tz.innerHTML = '<a href="javascript:void(0);" class="ticket-link t-pass" onclick="handleTicket(\'세뇨관이동\'); return false;">🚂 세뇨관 이동</a>';
    } else if (station === "세뇨관") {
      prev.innerText = "보먼주머니"; prev.className = "route-node"; cur.innerText = "세뇨관"; next.innerText = "모세 / 깔때기"; next.className = "route-node";
      tz.innerHTML = '<a href="javascript:void(0);" class="ticket-link t-reabsorb" onclick="handleTicket(\'재흡수\'); return false;">💖 재흡수 티켓</a>' +
                     '<a href="javascript:void(0);" class="ticket-link t-pass" onclick="handleTicket(\'통과\'); return false;">🎫 통과 티켓</a>';
    } else if (station === "모세혈관") {
      prev.innerText = "동맥 / 세뇨관"; prev.className = "route-node"; cur.innerText = "모세혈관"; next.innerText = "세뇨관 / 정맥"; next.className = "route-node";
      tz.innerHTML = '<a href="javascript:void(0);" class="ticket-link t-secrete" onclick="handleTicket(\'분비\'); return false;">⚠️ 분비 티켓</a>' +
                     '<a href="javascript:void(0);" class="ticket-link t-pass" onclick="handleTicket(\'통과\'); return false;">🏡 통과 티켓</a>';
    } else if (station === "종착지_콩팥정맥") {
      prev.innerText = "모세혈관"; cur.innerText = "🏅 콩팥정맥"; next.innerText = "온몸(심장)"; next.className = "route-node empty";
      var cb = document.getElementById("correctBox"); cb.style.display = "block";
      cb.innerHTML = "🎉 성공! [" + character + "]은(는) 안전하게 몸에 지켜져서 <strong>콩팥정맥</strong>을 통해 복귀했습니다!";
      boothZone.style.display = "none"; 
    } else if (station === "종착지_콩팥깔때기") {
      prev.innerText = "세뇨관 / 모세"; cur.innerText = "🚽 콩팥깔때기"; next.innerText = "오줌 배출"; next.className = "route-node empty";
      var wb = document.getElementById("wrongBox"); wb.style.display = "block"; wb.style.backgroundColor = "#fff3cd"; wb.style.color = "#856404"; wb.style.borderColor = "#ffeeba";
      wb.innerHTML = "🚽 배출 완료! [" + character + "]은(는) 정상적으로 걸러져서 <strong>콩팥깔때기</strong>에 모여 오줌이 되었습니다!";
      boothZone.style.display = "none"; 
    }
  }
  function handleTicket(chosenTicket) {
    if (!character) return; hideAllMessageBoxes();
    var cb = document.getElementById("correctBox"), wb = document.getElementById("wrongBox");
    if (currentStation === "콩팥동맥") {
      if (chosenTicket === "여과") {
        if (character === "단백질" || character === "혈구") { wb.style.display = "block"; wb.innerText = "❌ 정답이 아닙니다. 다시 선택하세요!"; }
        else { cb.style.display = "block"; cb.innerHTML = "⭕ <strong>정답입니다!</strong> [" + character + "]" + correctExplains["콩팥동맥"]["여과"]; moveStation("보먼주머니"); }
      } else if (chosenTicket === "통과") {
        if (character === "단백질" || character === "혈구") { cb.style.display = "block"; cb.innerHTML = "⭕ <strong>정답입니다!</strong> [" + character + "]" + correctExplains["콩팥동맥"]["통과"]; moveStation("모세혈관"); }
        else { wb.style.display = "block"; wb.innerText = "❌ 정답이 아닙니다. 다시 선택하세요!"; }
      }
    } else if (currentStation === "보먼주머니" && chosenTicket === "세뇨관이동") { moveStation("세뇨관"); }
    else if (currentStation === "세뇨관") {
      if (chosenTicket === "재흡수") {
        if (character === "포도당" || character === "아미노산" || character === "무기염류") { cb.style.display = "block"; cb.innerHTML = "⭕ <strong>정답입니다!</strong> [" + character + "]" + correctExplains["세뇨관"]["재흡수"]; moveStation("모세혈관"); }
        else { wb.style.display = "block"; wb.innerText = "❌ 정답이 아닙니다. 다시 선택하세요!"; }
      } else if (chosenTicket === "통과") {
        if (character === "요소" || character === "무기염류") { cb.style.display = "block"; cb.innerHTML = "⭕ <strong>정답입니다!</strong> [" + character + "]" + correctExplains["세뇨관"]["통과"]; moveStation("종착지_콩팥깔때기"); }
        else { wb.style.display = "block"; wb.innerText = "❌ 정답이 아닙니다. 다시 선택하세요!"; }
      }
    } else if (currentStation === "모세혈관") {
      if (chosenTicket === "분비") {
        if (character === "요소") { cb.style.display = "block"; cb.innerHTML = "⭕ <strong>정답입니다!</strong> [" + character + "]" + correctExplains["모세혈관"]["분비"]; moveStation("종착지_콩팥깔때기"); }
        else { wb.style.display = "block"; wb.innerText = "❌ 정답이 아닙니다. 다시 선택하세요!"; }
      } else if (chosenTicket === "통과") {
        if (character === "요소") { wb.style.display = "block"; wb.innerText = "❌ 정답이 아닙니다. 다시 선택하세요!"; }
        else { cb.style.display = "block"; cb.innerHTML = "⭕ <strong>정답입니다!</strong> [" + character + "]" + correctExplains["모세혈관"]["통과"]; moveStation("종착지_콩팥정맥"); }
      }
    }
  }
</script>
</body>
</html>
